name: Deploy to Google Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker
          docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/keff-server:latest ./server
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/keff-server:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy keff-server \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/keff-server:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},JWT_SECRET=${{ secrets.JWT_SECRET }},REDIS_URL=${{ secrets.REDIS_URL }}
          echo "Deployment complete."
