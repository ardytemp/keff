<!DOCTYPE html><html><head><meta charset="utf-8"><title>Keff</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><div id="login-view" class="view"><h1>Keff Login</h1><form id="login-form"><input type="email" id="email" placeholder="Email" required><input type="password" id="password" placeholder="Password" required><button type="submit">Login</button><p id="login-error" class="error"></p></form><p>Register: <a href="#" id="show-register">Create account</a></p><div id="register-form" class="hidden"><input type="text" id="reg-name" placeholder="Full Name"><button type="button" id="reg-submit">Register</button></div></div><div id="dashboard-view" class="view hidden"><header><h1>Keff Dashboard</h1><button id="logout-btn">Logout</button></header><nav><button data-tab="expenses" class="tab-btn active">Expenses</button><button data-tab="contacts" class="tab-btn">Contacts</button><button data-tab="categories" class="tab-btn">Categories</button></nav><main><section id="expenses-tab" class="tab active"><h2>Expenses</h2><form id="expense-form"><input type="number" step="0.01" id="exp-amount" placeholder="Amount" required><input type="date" id="exp-date" required><select id="exp-contact"></select><select id="exp-category"></select><input type="text" id="exp-desc" placeholder="Description"><button type="submit">Add</button></form><ul id="expenses-list"></ul></section><section id="contacts-tab" class="tab"><h2>Contacts</h2><form id="contact-form"><input type="text" id="contact-name" placeholder="Full Name" required><input type="email" id="contact-email" placeholder="Email"><input type="text" id="contact-phone" placeholder="Phone"><input type="text" id="contact-company" placeholder="Company"><button type="submit">Add</button></form><ul id="contacts-list"></ul></section><section id="categories-tab" class="tab"><h2>Categories</h2><form id="category-form"><input type="text" id="category-name" placeholder="Name" required><input type="text" id="category-color" placeholder="Color (e.g. #ff0000)"><button type="submit">Add</button></form><ul id="categories-list"></ul></section></main></div></div><script src="app.js"></script></body></html>
