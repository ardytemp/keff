steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/keff-server', './server']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/keff-server']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'run', 'deploy', 'keff-server', '--image', 'gcr.io/$PROJECT_ID/keff-server', '--platform', 'managed', '--region', 'us-central1', '--allow-unauthenticated']
images:
  - 'gcr.io/$PROJECT_ID/keff-server'
